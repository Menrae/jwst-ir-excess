# pipeline_config.yaml
#
# STATUS: placeholder scaffold (Phase 1). Values below are illustrative
# defaults / TODOs, not scientifically validated choices -- every TODO here
# should be resolved through explicit discussion before Phase 2 code depends
# on it.

project:
  name: jwst-ir-excess
  version: "0.0.1"
  description: >
    Pipeline for detecting anomalous mid-infrared excess in stars observed
    by JWST/MIRI, relative to stellar photosphere model predictions.

# --- Retriever stage (pipeline/retriever.py) ---
retriever:
  mast:
    mission: "JWST"
    instrument: "MIRI"
    # RESOLVED 2026-07-15 (see RESEARCH_CONTEXT.md Decision Log): MAST serves
    # both a calibrated Level 3 source catalog (_cat.ecsv, automated aperture
    # + isophotal photometry from the pipeline's source_catalog step) and the
    # _i2d.fits mosaics. Libralato et al. (2024, arXiv:2311.12145) show the
    # automated _cat.ecsv aperture photometry underperforms custom photometry
    # and is not intended for high-precision point-source work. We therefore
    # fetch _i2d as the primary product for excess-critical bands; _cat.ecsv
    # is kept only as a discovery/target-list aid, not as excess photometry.
    # The photometry-extraction method to run on _i2d (ePSF vs. aperture,
    # etc.) is a separate, still-open design question for a later stage.
    product_types:
      primary: "i2d"      # Level 3 resampled mosaic -- excess-critical photometry source (method TBD)
      auxiliary: "cat"    # Level 3 pipeline source catalog -- discovery/target-list aid only
    filters:
      - F770W
      - F1000W
  gaia:
    catalogue: "gaiadr3.gaia_source"
    # RESOLVED 2026-07-15 (see RESEARCH_CONTEXT.md Decision Log): MIRI-Gaia
    # match radius. Based on Libralato et al.'s reported ~1-3 mas MIRI
    # astrometric accuracy post-tweakreg (JWST aligns to Gaia by default),
    # with margin for detector-edge distortion and epoch-propagation error.
    # Applied AFTER propagating Gaia DR3 positions (with proper motion) to
    # the JWST observation epoch, not on raw catalog coordinates.
    crossmatch_radius_arcsec: 0.25
  twomass:
    catalogue: "II/246"  # 2MASS Point Source Catalogue (VizieR id)
    # RESOLVED 2026-07-15 (see RESEARCH_CONTEXT.md Decision Log): Gaia-2MASS
    # match radius. This is a fixed compromise, NOT a validated constant --
    # 2MASS positional uncertainty spans ~80-100 mas (bright, Ks<14) to
    # ~250 mas (faint, Ks~16) per the 2MASS Explanatory Supplement (Sec 4.9),
    # more than 2x across the catalog. 0.5" covers most of that range without
    # flooding crowded fields with ambiguous matches; the qc_* ambiguous-
    # match flag (not a crowding-dependent radius) is the mechanism relied on
    # to surface where this fixed value breaks down. Applied AFTER
    # propagating Gaia DR3 positions to the 2MASS epoch, not on raw
    # catalog coordinates. Revisit if ambiguous-match rate is high.
    crossmatch_radius_arcsec: 0.5

# --- Photosphere stage (pipeline/photosphere.py) ---
# RESOLVED 2026-07-20 (see RESEARCH_CONTEXT.md Decision Log): grid choice
# varies by rough Teff (Kurucz via stsynphot/CDBS for hot/FGK-default,
# PHOENIX via expecto for cool/FGK-cross-check), both confirmed queryable
# live in this environment. logg is fixed (dwarf/giant not distinguished --
# known simplification, see RESEARCH_CONTEXT.md). Extinction comes from the
# Bayestar19 3D dust map (dustmaps), not a joint SED fit, per literature
# precedent (Carrigan 2009; Wright et al. 2014; Griffith et al. 2015).
photosphere:
  fit_bands:
    - Gaia_G
    - Gaia_BP
    - Gaia_RP
    - 2MASS_J
    - 2MASS_H
    - 2MASS_Ks
  grids:
    hot_teff_min_k: 8000.0       # Teff >= this: Kurucz only
    cool_teff_max_k: 3500.0      # Teff <= this: PHOENIX only
    cross_check_buffer_k: 500.0  # widens cross-check zone around both
                                  # boundaries -- see RESEARCH_CONTEXT.md
                                  # (point 4, 2026-07-20) on why a hard
                                  # cutoff alone would apply the cross-check
                                  # inconsistently near a boundary
    fixed_log_g: 4.5             # main-sequence assumption; dwarfs/giants
                                  # not distinguished (known simplification)
    kurucz_grid: "ck04models"
    kurucz_metallicity: 0.0      # solar metallicity fixed -- known
                                  # simplification, not appropriate for
                                  # metal-poor halo stars (out of scope for
                                  # now, see RESEARCH_CONTEXT.md)
    cdbs_dir: "data/cdbs"        # auto-downloaded on first use (~5 MB,
                                  # ckp00 subgrid only, given metallicity is
                                  # fixed to solar) if not already present
  grid_disagreement:
    # qc_grid_disagreement threshold for the FGK cross-check bucket:
    # |Teff_kurucz - Teff_phoenix| > max(abs_floor_k, rel_frac * Teff_kurucz)
    abs_floor_k: 300.0
    rel_frac: 0.05
  binarity:
    # Gaia RUWE > 1.4 is the commonly used DR3 convention for "poor
    # single-star astrometric solution" (Lindegren et al.) -- used here as
    # a starting flag threshold, not independently re-derived.
    ruwe_threshold: 1.4
  # qc_poor_photosphere_fit threshold (reduced chi-square). A starting
  # value, NOT independently justified/validated -- same status as the
  # 2MASS crossmatch radius in retriever.py (a stated, reasoned compromise,
  # not a derived scientific threshold). Revisit once real fit results
  # exist to see what a "poor fit" actually looks like in practice.
  poor_fit_reduced_chi2_threshold: 5.0
  extinction:
    dust_map: "bayestar2019"
    # mode='best' + max_samples=0 (see estimate_extinction in photosphere.py
    # for the full rationale): drops BayestarQuery's peak memory from
    # ~6.2 GB (max_samples=2, mode='median') to ~2.3 GB, confirmed live
    # 2026-07-20 -- a documented tradeoff (maximum-posterior point estimate
    # instead of median-of-samples), not just a performance default.
    max_samples: 0
    reddening_law: "G23"  # Gordon et al. (2023), via dust_extinction --
                           # NOTE: this value is descriptive only, not
                           # currently read by photosphere.py (which
                           # imports G23 directly); update both together if
                           # this ever changes.
    r_v: 3.1
  target_classification_tokens:
    white_dwarf:
      - "White dwarfs"
    pms_veiling_risk:
      - "Protoplanetary disks"
      - "Protostars"
      - "Pre-main sequence stars"
      - "Young stellar objects"
      - "T Tauri stars"
      - "Proplyds"
      - "Circumstellar disks"

# --- MIRI photometry extraction stage (pipeline/miri_photometry.py) ---
# RESOLVED 2026-07-21 (see RESEARCH_CONTEXT.md Decision Log): model-PSF
# fitting (stpsf + photutils.psf.PSFPhotometry) is the PRIMARY observed-flux
# measurement, with careful aperture photometry as a parallel cross-check.
# Both are corrected to "infinite aperture" equivalent using the SAME row
# (same aperture radius, sky annulus, and apcorr multiplier) from the JWST
# pipeline's own CRDS APCORR reference file -- the same file the pipeline's
# source_catalog step uses internally to produce _cat.ecsv's aper_total_flux.
# Confirmed via an exact numerical round-trip against real archive data
# (aper70_flux * apcorr(0.7) == aper_total_flux to 4 sig figs).
miri_photometry:
  # Which APCORR table row (EE fraction) defines the aperture radius used
  # for BOTH the PSF-fit stamp/local-background-subtraction geometry AND
  # the aperture cross-check -- 0.7 is the value confirmed 2026-07-21 to
  # exactly reproduce _cat.ecsv's aper_total_flux when multiplied by its
  # own apcorr value for a real test star. Not independently re-derived for
  # other EE fractions; revisit only if 0.7 turns out to behave poorly for
  # some filter/subarray not yet tested.
  target_ee_fraction: 0.7
  apcorr:
    # Pinned to a specific CRDS reference file version rather than queried
    # live via CRDS's JSON-RPC API at runtime -- same philosophy as
    # photosphere.py's FIT_BAND_ZEROPOINT_JY (avoids a live per-run
    # dependency on an API that has only been smoke-tested once, not
    # load-tested for pipeline-scale reliability). Confirmed live
    # 2026-07-21 to be CRDS's current best reference for MIR_IMAGE via
    # get_best_references against the live operational context
    # (jwst_1535.pmap) -- if CRDS publishes a newer MIR_IMAGE apcorr
    # reference later, this pin will silently go stale; revisit by
    # re-running the same get_best_references check, not by assuming this
    # is still current indefinitely.
    reference_filename: "jwst_miri_apcorr_0014.fits"
    url: "https://jwst-crds.stsci.edu/unchecked_get/references/jwst/jwst_miri_apcorr_0014.fits"
    cache_dir: "data/crds_cache"
    subarray: "FULL"
  # Extra margin (pixels) added beyond the EE-aperture radius when sizing
  # the PSF-fit stamp / fit_shape, so the fit has some working room beyond
  # the exact EE-defining radius. A stated compromise, not derived --
  # same status as photosphere.py's DEFAULT_MAG_ERR.
  fov_margin_px: 2
  crowding:
    # qc_crowded_source fires if another a0 star (in the same mosaic) falls
    # within this pixel separation -- a stated compromise, not derived;
    # KNOWN SIMPLIFICATION: checks against other a0 stars only (Gaia-matched
    # or not -- retriever.py's pivot keeps unmatched detections as singleton
    # a0 rows too), not every raw MIRI detection outside a0's population.
    min_separation_px: 20.0
  disagreement:
    # qc_psf_aperture_disagreement threshold: |psf_flux - aperture_flux| >
    # max(abs_floor_jy, rel_frac * |psf_flux|) -- same abs_floor/rel_frac
    # pattern as photosphere.py's qc_grid_disagreement. Stated compromise,
    # not derived. RE-EXAMINED 2026-07-21 against 3 real fields (PN-TC-1,
    # CONTROLFIELD, NGC-602; see RESEARCH_CONTEXT.md): disagreement rate
    # varies 15-69% by field, tracking field character rather than
    # indicating a miscalibrated threshold -- rel_frac was NOT changed as a
    # result of that investigation.
    abs_floor_jy: 1.0e-6
    rel_frac: 0.2
    # Splits qc_psf_aperture_disagreement into qc_psf_disagreement_faint
    # (SNR below this) vs qc_psf_disagreement_complex (SNR at/above this,
    # or uncomputable) -- see classify_disagreement in miri_photometry.py
    # and RESEARCH_CONTEXT.md (2026-07-21) for the full derivation. A
    # stated compromise grounded in real data, not a precisely derived
    # boundary: PN-TC-1's entire (independently confirmed faint-driven)
    # flagged population topped out at SNR=29.2, while the real
    # complex-driver example that motivated this split (NGC-602's
    # brightest source) had SNR=1425 -- two orders of magnitude apart, with
    # the exact cutoff in between not rigorously derived.
    snr_threshold: 50.0

# --- Excess scoring stage (pipeline/excess.py) ---
# RESOLVED 2026-07-22 (see RESEARCH_CONTEXT.md Decision Log): excess_sigma_{band}
# ((observed-predicted)/combined_err) is computed unconditionally. The literature
# check (Carrigan 2009; Griffith et al. 2015) found neither paper applies a
# Bonferroni/FDR-style multiple-testing correction to their published method --
# both instead cut on a physically-motivated or categorical criterion, then
# manually vet every surviving source individually. A real survivor-count check
# against three already-live-tested archive fields (PN-TC-1, CONTROLFIELD,
# NGC-602) confirmed the pooled survivor count is nearly flat from 3-sigma to
# 5-sigma (real signal in that data sits far above any of these cuts, up to
# sigma=168.6) -- so a stricter cut buys no discriminating power there, only
# risk of losing a real but modest candidate.
excess:
  primary_bands:
    - F770W
    - F1000W
  # SET 2026-07-22 (researcher's decision). This is a TRIAGE CUT chosen to
  # produce a reviewable shortlist consistent with precedent practice
  # (Carrigan 2009; Griffith et al. 2015) -- it is explicitly NOT a
  # look-elsewhere/Bonferroni-corrected statistical significance claim, and
  # must never be described as one in any writeup. Required in BOTH bands
  # simultaneously for a star with qc_single_filter_detection==0 (neither
  # "either band" nor "single band alone" is used as the primary criterion).
  # The real filtering step this project relies on is the disqualifying qc_*
  # flags (pipeline.excess.DISQUALIFYING_STAR_FLAGS/DISQUALIFYING_BAND_FLAGS)
  # plus manual review of every survivor, not fine-grained statistical
  # discrimination from the sigma cut itself -- consistent with both
  # precedent papers' own wide-net-then-vet philosophy.
  significance_threshold_sigma: 3.0
  # SET 2026-07-22 (researcher's sign-off). Same TRIAGE CUT philosophy as
  # significance_threshold_sigma above -- NOT a corrected statistical
  # significance claim. Deliberately a genuinely separate, stricter value,
  # not significance_threshold_sigma scaled down: qc_single_filter_detection==1
  # stars (only one MIRI band ever measured) don't get the dual-band
  # cross-check that gives the primary criterion its own (already modest)
  # credibility. Derivation (see RESEARCH_CONTEXT.md Decision Log): neither
  # Carrigan (2009) nor Griffith et al. (2015) offers a directly borrowable
  # number for a single-band case (Carrigan's own experience was to avoid
  # a 2-filter significance statistic entirely, adding LRS spectroscopy
  # instead, specifically because two points couldn't support one; Griffith's
  # method is structurally multi-band via WISE colors). Derived instead from
  # a rough independence approximation: the dual-band criterion's own
  # credibility comes from requiring BOTH bands to independently clear 3
  # sigma (one-tailed P~1.35e-3 each, joint ~1.8e-6 under independence);
  # solving for the single one-tailed z giving that same tail probability
  # alone gives z~4.7. Rounded up to 5.0, not down, given real flux-error
  # correlation between F770W/F1000W (shared PSF-fit method, shared
  # diffuse-background-annulus systematic -- see Deferred item 6) that the
  # independence approximation ignores, and because a single-band detection
  # loses the cross-check entirely, not partially. Verified against real
  # data before being set: in the full 273-star, 15-field trial, only 2/273
  # single-band stars even reach a computed excess_sigma at all (the rest
  # are disqualified earlier); this value changes zero current results --
  # it is establishing the policy correctly ahead of when it starts
  # mattering, not reshaping any existing outcome. These stars get their own
  # qc_single_band_candidate marker, kept separate from
  # qc_candidate_preliminary rather than folded in (a true dual-band
  # candidate and a single-band-only one are different kinds of claim, same
  # reasoning as output.py's two separate candidate/flagged-for-review
  # tables).
  single_band_significance_threshold_sigma: 5.0
  # STOPGAP (added 2026-07-22, see pipeline/excess.py module docstring and
  # RESEARCH_CONTEXT.md Decision Log): the survivor-count check above found
  # that ALL 5 real survivors across all three test fields had a
  # target_classification already indicating a conventional astrophysical
  # explanation for genuine mid-IR excess ("Stellar Cluster; Young star
  # clusters" or "Star; Planetary nebulae nuclei") -- and that fixing just
  # these two gaps (neither caught by any existing flag, including
  # photosphere.py's qc_pms_veiling_risk) would have caught all 5. These token
  # lists are a NARROW, SESSION-VERIFIED set (exact strings actually observed
  # live against the MAST archive during that check) -- NOT a systematic
  # vocabulary sweep like retriever.py's STELLAR_TARGET_CLASSIFICATIONS
  # allowlist, and NOT a substitute for pipeline/contaminants.py's eventual
  # proper catalogue cross-matching (qc_evolved_star, etc.), which will
  # supersede this. Matched via exact semicolon-separated-component match
  # (pipeline.excess._classification_matches), same convention as
  # photosphere.py's is_pms_veiling_risk/is_white_dwarf.
  #
  # REFINEMENT (2026-07-22): target_classification is a MAST field/observation-
  # level tag, identical for every star in a pointing (confirmed empirically),
  # so a blanket match disqualifies the whole field, not just the actual
  # contaminant. is_stopgap_evolved_star (evolved_star token list below) was
  # first refined to also check photosphere_teff against grids.hot_teff_min_k
  # (genuine planetary-nebula nuclei are far hotter than that boundary, so a
  # star with a real, cooler fitted Teff was exonerated -- verified: all 12
  # real PN-TC-1 stars with a fit came back 4500-9000 K), THEN RETIRED
  # ENTIRELY once pipeline/contaminants.py's proper qc_evolved_star existed
  # and was verified (2026-07-22 -- see RESEARCH_CONTEXT.md Decision Log).
  # The evolved_star token list below is gone; only young_cluster remains.
  # is_stopgap_young_cluster was NOT given an analogous refinement -- Gaia
  # parallax/PM consistency against the field's own population was checked
  # and found NOT safe to ship naively (parallax has ~no discriminating
  # power for genuine members of an SMC-distance cluster like NGC-602, and
  # CONTROLFIELD's own Gaia-matched sample shows no single dominant
  # PM/parallax clump to check against) -- logged as an explicit, accepted
  # blind spot in RESEARCH_CONTEXT.md, not fixed here. This remains active
  # (contaminants.py has no young-cluster/PMS-association category yet).
  stopgap_contaminant_tokens:
    young_cluster:
      - "Young star clusters"
      - "Stellar Cluster"

# --- Contaminant classification stage (pipeline/contaminants.py) ---
contaminants:
  categories:
    - debris_disk
    - background_galaxy
    - agb_or_evolved_giant
    - photometric_artifact
    - known_variable
    - unresolved_binary
  # TODO: identify specific reference catalogues for debris_disk (Kennedy &
  # Wyatt 2013 confirmed 2026-07-22 NOT usable -- see RESEARCH_CONTEXT.md
  # Decision Log) and photometric_artifact (needs Level 2 _cal.fits DQ
  # arrays + per-source WCS remapping, see contaminants.py module docstring)
  # before either can be implemented -- Tier 3, still blocked.
  # GAP (noted 2026-07-22, not resolved here): there is currently no
  # "young stellar object / PMS cluster association" category in this list at
  # all, despite excess.py's stopgap_contaminant_tokens.young_cluster above
  # showing this is a real, non-rare contaminant population in this project's
  # own test data. Worth adding as a seventh category (or folding into
  # agb_or_evolved_giant's proper cross-match design) when contaminants.py is
  # actually designed.
  #
  # IMPLEMENTED 2026-07-22 (Tiers 1 and 2 of the priority ordering, see
  # RESEARCH_CONTEXT.md Decision Log): qc_evolved_star (this section),
  # qc_background_galaxy (needs no config -- reuses a0's existing
  # is_extended_{band} directly), qc_known_variable (needs no config --
  # queries gaiadr3.vari_summary directly, see contaminants.py), and
  # qc_binary_companion_contamination (needs no config -- a deliberate
  # passthrough of the already-implemented qc_possible_binary, not new
  # logic; see Decision Log Question 1). All four run over the FULL b1
  # population, not just excess-showing candidates.
  evolved_star:
    # qc_evolved_star fires when a star's Gaia-parallax-based absolute G
    # magnitude is brighter than the expected main-sequence value at its own
    # fitted Teff (pipeline.contaminants.expected_ms_abs_g) by more than this
    # many magnitudes -- a stated compromise, not a derived threshold, same
    # status as this project's other abs_floor/rel_frac-style thresholds.
    # 2.5 mag corresponds to roughly 10x the expected main-sequence
    # luminosity at that Teff -- a substantial, not-explainable-by-
    # measurement-error overluminosity typical of subgiants/giants.
    # Extinction is NOT applied when computing absolute G magnitude (see
    # pipeline/contaminants.py module docstring for why that's a
    # deliberate, directionally-safe simplification, not an oversight).
    overluminosity_mag_threshold: 2.5
    # ADDED mid-implementation 2026-07-22, after a real PN-TC-1 run surfaced
    # several faint, distant sources (fractional parallax error up to 165%)
    # getting flagged as "overluminous" purely from parallax noise --
    # inverting a low-S/N parallax to get a distance is a well-known bias
    # that systematically manufactures apparent overluminosity for
    # intrinsically ordinary stars. parallax/parallax_error must meet this
    # bar before a derived distance/magnitude is trusted at all; a
    # commonly-used convention in Gaia-based work (parallax S/N >= 5, i.e.
    # fractional error <= 20%), same status as photosphere.py's RUWE>1.4
    # threshold (a standard convention, not independently re-derived here).
    min_parallax_over_error: 5.0

  # IMPLEMENTED 2026-07-22 (first Tier-3 item, see RESEARCH_CONTEXT.md
  # Decision Log for the time-boxed catalog search): qc_debris_disk_prime /
  # qc_debris_disk_reserved, position cross-match against Cotten & Song
  # (2016), ApJS 225, 15, "A Comprehensive Census of Nearby Infrared Excess
  # Stars" (VizieR J/ApJS/225/15) -- table3 ("Prime", 505 stars,
  # higher-confidence) and table4 ("Reserved", 1257 stars, lower-
  # confidence), kept as TWO SEPARATE flags (researcher's decision), same
  # pattern as miri_photometry.py's qc_psf_disagreement_faint/_complex
  # split -- both disqualifying for now, but distinguishable so the
  # Reserved tier's strictness can be reconsidered later without
  # redesigning the flag. Kennedy & Wyatt (2013), the originally-cited
  # source, was ruled out the same day (confirmed via its own abstract to
  # be a luminosity-function/demographic study, not a per-star catalogue).
  debris_disk:
    # STATED COMPROMISE, not derived -- same status as retriever.py's
    # 2MASS crossmatch radius. Deliberately more generous than this
    # project's Gaia-MIRI (0.25") or Gaia-2MASS (0.5") radii: Cotten &
    # Song's positions come from Tycho-2 (epoch ~1991) x AllWISE, with NO
    # per-star proper motion available to propagate forward to our stars'
    # Gaia epoch (2016.0) -- unlike the Gaia-2MASS crossmatch, which DOES
    # propagate epochs. qc_ambiguous_debris_disk_match is the mechanism
    # relied on to surface where this compromise breaks down, same role it
    # plays in retriever.py's own crossmatches.
    crossmatch_radius_arcsec: 2.0

  # IMPLEMENTED 2026-07-22 (Milky Way half of the young-cluster/PMS gap --
  # see excess.py's qc_stopgap_young_cluster and RESEARCH_CONTEXT.md's Tier
  # 3 sequencing entry): qc_cluster_member_confirmed / qc_confirmed_field_star,
  # cross-matched by gaia_source_id (not position) against Cantat-Gaudin
  # et al. (2020), A&A 640, A1 (VizieR J/A+A/640/A1, "nodup" members table)
  # -- a Gaia-based Milky Way open-cluster membership catalogue. Explicitly
  # does NOT cover the extragalactic half (e.g. NGC-602/SMC) -- that remains
  # genuinely open, no catalogue identified.
  cluster_membership:
    # Same convention/value as evolved_star.min_parallax_over_error (a
    # standard Gaia-work S/N convention, not independently re-derived) --
    # but here it does double duty: it also structurally prevents this
    # check from ever exonerating a genuinely extragalactic star (see
    # pipeline/contaminants.py module docstring for the verified reasoning,
    # not just an assumption).
    min_parallax_over_error: 5.0

# --- Output stage (pipeline/output.py) ---
output:
  catalogue_format: "fits"
  figures_dir: "results/figures"
  tables_dir: "results/tables"
